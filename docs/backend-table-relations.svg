<svg width="1900" height="1300" viewBox="0 0 1900 1300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fffdfb; }
      .title { font: 700 36px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #2f241d; }
      .subtitle { font: 500 17px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #8b715d; }
      .group { fill: #fff8f2; stroke: #efd9c6; stroke-width: 2; }
      .group-title { font: 700 24px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #4a3528; }
      .group-subtitle { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #8d725d; }
      .box { fill: #ffffff; stroke: #efc8ac; stroke-width: 2; rx: 18; }
      .box-alt { fill: #fffaf6; stroke: #efc8ac; stroke-width: 2; rx: 18; }
      .box-title { font: 700 18px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #392b21; }
      .box-table { font: 500 14px Consolas, 'Microsoft YaHei', monospace; fill: #a36f48; }
      .box-note { font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #786558; }
      .line { stroke: #c97f49; stroke-width: 2.5; fill: none; }
      .line-soft { stroke: #d7a17c; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; }
      .label { font: 500 14px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #925f37; }
      .legend-title { font: 700 22px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #4a3528; }
      .legend-text { font: 500 15px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #6a574a; }
      .chip { fill: #fff3e7; stroke: #efcfb5; stroke-width: 1.2; }
      .chip-text { font: 600 13px 'Microsoft YaHei', 'PingFang SC', sans-serif; fill: #9a6438; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#c97f49"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d7a17c"/>
    </marker>
  </defs>

  <rect width="1900" height="1300" class="bg"/>
  <text x="60" y="70" class="title">城味项目后端数据表关系图</text>
  <text x="60" y="105" class="subtitle">这版只保留最关键关系，并把跨模块箭头改成“少量、可追踪”的路线，方便你先建立整体感。</text>

  <!-- 用户模块 -->
  <rect x="40" y="150" width="360" height="410" rx="28" class="group"/>
  <text x="68" y="190" class="group-title">用户模块</text>
  <text x="68" y="218" class="group-subtitle">账号、资料、关注、签到</text>

  <rect x="70" y="250" width="300" height="88" class="box"/>
  <text x="92" y="283" class="box-title">用户主表</text>
  <text x="92" y="307" class="box-table">tb_user</text>
  <text x="92" y="328" class="box-note">手机号、密码、昵称、头像</text>

  <rect x="70" y="360" width="300" height="88" class="box-alt"/>
  <text x="92" y="393" class="box-title">用户扩展资料</text>
  <text x="92" y="417" class="box-table">tb_user_info</text>
  <text x="92" y="438" class="box-note">城市、简介、性别、生日、粉丝数</text>

  <rect x="70" y="470" width="300" height="88" class="box-alt"/>
  <text x="92" y="503" class="box-title">关注关系</text>
  <text x="92" y="527" class="box-table">tb_follow</text>
  <text x="92" y="548" class="box-note">user_id 关注 follow_user_id</text>

  <path d="M220 338 L220 360" class="line" marker-end="url(#arrow)"/>
  <text x="238" y="353" class="label">1 对 1</text>
  <path d="M220 338 L220 470" class="line" marker-end="url(#arrow)"/>
  <text x="238" y="463" class="label">1 对多</text>

  <!-- 内容模块 -->
  <rect x="40" y="620" width="540" height="380" rx="28" class="group"/>
  <text x="68" y="660" class="group-title">内容模块</text>
  <text x="68" y="688" class="group-subtitle">用户发博客，博客评论支持回复，博客还能关联店铺</text>

  <rect x="70" y="750" width="220" height="108" class="box"/>
  <text x="92" y="786" class="box-title">博客 / 探店笔记</text>
  <text x="92" y="811" class="box-table">tb_blog</text>
  <text x="92" y="834" class="box-note">作者 user_id</text>
  <text x="92" y="854" class="box-note">可关联店铺 shop_id</text>

  <rect x="340" y="750" width="210" height="108" class="box-alt"/>
  <text x="362" y="786" class="box-title">博客评论</text>
  <text x="362" y="811" class="box-table">tb_blog_comments</text>
  <text x="362" y="834" class="box-note">属于 blog_id</text>
  <text x="362" y="854" class="box-note">支持 parent_id 回复</text>

  <path d="M290 804 L340 804" class="line" marker-end="url(#arrow)"/>
  <text x="292" y="786" class="label">1 篇博客有多条评论</text>

  <path d="M445 858 C500 905,500 945,445 985 C390 945,390 905,445 858" class="line-soft" marker-end="url(#arrowSoft)"/>
  <text x="505" y="928" class="label">评论可回复评论</text>

  <!-- 店铺模块 -->
  <rect x="650" y="150" width="510" height="470" rx="28" class="group"/>
  <text x="678" y="190" class="group-title">店铺模块</text>
  <text x="678" y="218" class="group-subtitle">分类、店铺主表、店铺评论</text>

  <rect x="690" y="250" width="190" height="94" class="box-alt"/>
  <text x="712" y="284" class="box-title">店铺分类</text>
  <text x="712" y="308" class="box-table">tb_shop_type</text>
  <text x="712" y="329" class="box-note">美食 / KTV / 健身等</text>

  <rect x="690" y="385" width="390" height="118" class="box"/>
  <text x="712" y="422" class="box-title">店铺主表</text>
  <text x="712" y="448" class="box-table">tb_shop</text>
  <text x="712" y="472" class="box-note">名称、分类、地址、坐标、营业时间、评分</text>
  <text x="712" y="494" class="box-note">前台浏览、后台管理、店长维护都围绕这张表</text>

  <rect x="690" y="535" width="390" height="86" class="box-alt"/>
  <text x="712" y="568" class="box-title">店铺评论</text>
  <text x="712" y="592" class="box-table">tb_shop_comment</text>
  <text x="712" y="612" class="box-note">用户对店铺的评分、文字、图片</text>

  <path d="M785 344 L885 385" class="line" marker-end="url(#arrow)"/>
  <text x="805" y="364" class="label">1 个分类下有多家店</text>
  <path d="M885 503 L885 535" class="line" marker-end="url(#arrow)"/>
  <text x="903" y="527" class="label">1 家店有多条评论</text>

  <!-- 交易模块 -->
  <rect x="1230" y="150" width="610" height="520" rx="28" class="group"/>
  <text x="1258" y="190" class="group-title">交易模块</text>
  <text x="1258" y="218" class="group-subtitle">店铺发券，用户下单，店员核销</text>

  <rect x="1270" y="250" width="245" height="108" class="box"/>
  <text x="1292" y="286" class="box-title">优惠券主表</text>
  <text x="1292" y="311" class="box-table">tb_voucher</text>
  <text x="1292" y="334" class="box-note">店铺券、团购券、规则、价格</text>

  <rect x="1560" y="250" width="240" height="108" class="box-alt"/>
  <text x="1582" y="286" class="box-title">秒杀券扩展</text>
  <text x="1582" y="311" class="box-table">tb_seckill_voucher</text>
  <text x="1582" y="334" class="box-note">库存、开始时间、结束时间</text>

  <rect x="1365" y="460" width="340" height="150" class="box"/>
  <text x="1387" y="496" class="box-title">优惠券订单</text>
  <text x="1387" y="521" class="box-table">tb_voucher_order</text>
  <text x="1387" y="544" class="box-note">用户下单、支付状态、核销码、核销时间</text>
  <text x="1387" y="566" class="box-note">连接用户、优惠券、门店、店员</text>
  <text x="1387" y="588" class="box-note">是交易链的最终落库表</text>

  <path d="M1515 304 L1560 304" class="line" marker-end="url(#arrow)"/>
  <text x="1480" y="286" class="label">1 对 1 秒杀扩展</text>
  <path d="M1395 358 L1495 460" class="line" marker-end="url(#arrow)"/>
  <text x="1368" y="420" class="label">1 张券可产生多笔订单</text>

  <!-- 权限模块 -->
  <rect x="650" y="700" width="510" height="380" rx="28" class="group"/>
  <text x="678" y="740" class="group-title">权限模块</text>
  <text x="678" y="768" class="group-subtitle">管理员、店长、店员</text>

  <rect x="690" y="800" width="390" height="112" class="box"/>
  <text x="712" y="836" class="box-title">门店员工账号</text>
  <text x="712" y="861" class="box-table">tb_shop_clerk</text>
  <text x="712" y="884" class="box-note">role=1 店长，role=2 店员</text>
  <text x="712" y="904" class="box-note">同一个 shop_id 下可有多个人</text>

  <rect x="690" y="950" width="390" height="86" class="box-alt"/>
  <text x="712" y="983" class="box-title">平台管理员</text>
  <text x="712" y="1007" class="box-table">tb_admin</text>
  <text x="712" y="1028" class="box-note">创建店铺、指定首个店长</text>

  <!-- 跨模块箭头：尽量少且分层 -->
  <path d="M220 338 C220 520,170 620,150 750" class="line" marker-end="url(#arrow)"/>
  <text x="76" y="628" class="label">用户发布博客</text>

  <path d="M250 338 C310 520,410 620,445 750" class="line" marker-end="url(#arrow)"/>
  <text x="362" y="628" class="label">用户写博客评论</text>

  <path d="M370 548 C520 548,600 578,690 578" class="line" marker-end="url(#arrow)"/>
  <text x="470" y="530" class="label">用户给店铺写评论</text>

  <path d="M290 770 C430 690,560 570,690 455" class="line-soft" marker-end="url(#arrowSoft)"/>
  <text x="432" y="690" class="label">博客可关联店铺（shop_id）</text>

  <path d="M1080 435 C1160 435,1210 360,1270 304" class="line" marker-end="url(#arrow)"/>
  <text x="1128" y="392" class="label">店铺配置优惠券</text>

  <path d="M370 300 C720 300,1080 360,1365 520" class="line" marker-end="url(#arrow)"/>
  <text x="885" y="316" class="label">用户购买优惠券并生成订单</text>

  <path d="M1080 440 C1180 520,1240 610,1365 610" class="line" marker-end="url(#arrow)"/>
  <text x="1168" y="596" class="label">店铺对应的券与订单继续关联</text>

  <path d="M1080 856 C1200 856,1270 760,1365 560" class="line" marker-end="url(#arrow)"/>
  <text x="1198" y="786" class="label">店员 / 店长核销订单，写回核销人</text>

  <path d="M1080 993 C1160 910,1180 770,1180 503" class="line-soft" marker-end="url(#arrowSoft)"/>
  <text x="1202" y="820" class="label">管理员创建店铺并指定首个店长</text>

  <path d="M960 503 L960 800" class="line" marker-end="url(#arrow)"/>
  <text x="980" y="662" class="label">一家店可有多个店长 / 店员账号</text>

  <!-- 右下角总结 -->
  <rect x="1230" y="730" width="610" height="350" rx="28" class="group"/>
  <text x="1258" y="772" class="legend-title">阅读这张图的正确方法</text>
  <text x="1262" y="826" class="legend-text">1. 先只看每个模块里有哪些核心表，不要先追箭头。</text>
  <text x="1262" y="864" class="legend-text">2. 再看 3 条主线：</text>
  <text x="1290" y="902" class="legend-text">用户内容链：用户 → 博客 → 博客评论</text>
  <text x="1290" y="938" class="legend-text">店铺交易链：店铺分类 → 店铺 → 优惠券 → 订单</text>
  <text x="1290" y="974" class="legend-text">门店权限链：管理员 → 店铺 → 店长/店员 → 核销订单</text>
  <text x="1262" y="1032" class="legend-text">3. 最后再看跨模块箭头，它们表示“数据会被带到另一条业务链里”。</text>

  <!-- 小提示 -->
  <rect x="50" y="1160" width="1800" height="44" rx="18" class="chip"/>
  <text x="72" y="1188" class="chip-text">补充说明：博客关联店铺这件事，本质就是 tb_blog 里有一个 shop_id，它让“内容模块”和“店铺模块”发生了连接。</text>
</svg>
